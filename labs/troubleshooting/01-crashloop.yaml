apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: lab-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Simulated crash"; exit 1
