apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: lab-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          env:
            - name: APP_TITLE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: APP_TITLE
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: APP_MESSAGE
            - name: APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: web-secret
                  key: APP_TOKEN
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat >/usr/share/nginx/html/index.html <<'EOF'
              <html><body>
              <h1>${APP_TITLE}</h1>
              <p>${APP_MESSAGE}</p>
              <p>Token length: ${#APP_TOKEN}</p>
              </body></html>
              EOF
              nginx -g 'daemon off;'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
